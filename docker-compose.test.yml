version: '3.8'

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - APP_ENV=test
      - API_KEY=test-key-123
    volumes:
      - ./:/app
      - /app/__pycache__
      - /app/.pytest_cache
      - ./coverage_html:/app/coverage_html
    command: >
      sh -c "pytest tests/ 
      --cov=app 
      --cov-report=term 
      --cov-report=html:/app/coverage_html 
      -v"