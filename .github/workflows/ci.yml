name: CI - Testes Automatizados

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Instalar dependências do sistema (fontes)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core
      
      - name: Criar diretório de assets se não existir
        run: |
          mkdir -p app/assets
      
      - name: Verificar se o template existe
        run: |
          if [ ! -f app/assets/modelo.jpg ]; then
            echo "⚠️ Aviso: Template não encontrado em app/assets/modelo.jpg"
            echo "Criando uma imagem de template para testes..."
            # Criar uma imagem simples para testes
            python -c " from PIL import Image
            img = Image.new('RGB', (1600, 504), color='white')
            img.save('app/assets/modelo.jpg')
            print('Imagem de template criada em app/assets/modelo.jpg')"
          fi
      
      - name: Executar testes com cobertura
        env:
          API_KEY: ${{ secrets.API_KEY || 'test-key-123' }}
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            -v
      
      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
      
      - name: Upload para Codecov (opcional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}