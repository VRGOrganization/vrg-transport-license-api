name: Testes em Container Docker

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  docker-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Criar imagem de template para testes
        run: |
          mkdir -p app/assets
          # Se não existir template, criar um para testes
          if [ ! -f app/assets/modelo.jpg ]; then
            python -c "
            from PIL import Image
            img = Image.new('RGB', (1600, 504), color='white')
            img.save('app/assets/modelo.jpg')
            "
          fi3
      
      - name: Build da imagem Docker de teste
        run: |
          docker build -f Dockerfile.test -t vrg-api-test .
      
      - name: Executar testes no container
        run: |
          docker run --rm \
            -e API_KEY=${{ secrets.API_KEY || 'test-key-123' }} \
            vrg-api-test pytest tests/ -v
      
      - name: Executar testes com cobertura no container
        run: |
          docker run --rm \
            -e API_KEY=${{ secrets.API_KEY || 'test-key-123' }} \
            -v ${{ github.workspace }}/coverage_html:/app/coverage_html \
            vrg-api-test pytest tests/ \
              --cov=app \
              --cov-report=term \
              --cov-report=html:/app/coverage_html
      
      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: docker-coverage-report
          path: coverage_html/
          retention-days: 7